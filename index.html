<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Navy CS Reference</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00386B">
<style>
:root{
  --bg:#0b1827;--bg2:#0e2040;--bg3:#0a1e3a;
  --border:#1a3356;--border2:#1e4a7a;
  --navy:#00386B;--gold:#C59A00;--gold2:#FFE066;
  --text:#e8e0d0;--text2:#b0c4d8;--text3:#5a8ab8;
  --green:#4CAF50;--red:#c0392b;--amber:#F57F17;--teal:#00897B;
}
.dark{
  --bg:#050505;--bg2:#0a0a0a;--bg3:#111;
  --border:#1a1a1a;--border2:#2a2a2a;
  --text:#ddd;--text2:#999;--text3:#555;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:var(--bg);font-family:Georgia,'Times New Roman',serif;color:var(--text);transition:background .2s;}

/* HEADER */
.hdr{background:linear-gradient(90deg,#00386B,#004f99 55%,#C59A00 100%);
  padding:8px 14px;border-bottom:3px solid var(--gold);
  display:flex;align-items:center;justify-content:space-between;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.anchor{background:var(--gold);border-radius:50%;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:bold;color:#fff;line-height:1.1;}
.hdr-sub{font-size:8px;color:#ffe08a;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.night-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 11px;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;}

/* NAV */
.nav{display:flex;background:var(--bg2);border-bottom:2px solid var(--border);overflow-x:auto;}
.nav-btn{padding:10px 18px;font-size:12px;cursor:pointer;white-space:nowrap;
  border:none;border-bottom:3px solid transparent;color:var(--text3);
  background:none;font-family:inherit;letter-spacing:.3px;transition:all .15s;}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:bold;}

/* CONTROLS */
.ctrl{padding:10px 14px 8px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;}
.srch-wrap{position:relative;}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}
input[type=text]{width:100%;padding:9px 10px 9px 32px;background:var(--bg);
  border:1.5px solid var(--border2);border-radius:8px;color:var(--text);
  font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--gold);}

/* CHIPS */
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.chip{padding:3px 9px;border-radius:12px;border:1px solid var(--border2);
  background:transparent;color:var(--text3);font-size:10px;cursor:pointer;
  font-family:inherit;transition:all .12s;white-space:nowrap;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.active{background:var(--gold);border-color:var(--gold);color:#0a1628;font-weight:bold;}
.rcount{margin-top:5px;font-size:10px;color:var(--text3);}

/* CARDS */
.results{padding:10px 13px 56px;max-width:960px;margin:0 auto;}
.empty{text-align:center;padding:40px 0;color:var(--text3);font-size:14px;}
.card{background:linear-gradient(135deg,var(--bg3),var(--bg2));
  border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;cursor:pointer;transition:all .15s;margin-bottom:7px;}
.card:hover{border-color:#2a5a8a;}
.card.open{border-color:var(--gold);box-shadow:0 3px 14px rgba(197,154,0,.12);}
.card.safety{border-left:4px solid var(--red);}
.card-inner{display:flex;align-items:flex-start;gap:9px;}
.cat-badge{border-radius:4px;padding:2px 6px;font-size:9px;font-weight:bold;
  white-space:nowrap;font-family:'Courier New',monospace;flex-shrink:0;margin-top:1px;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:13px;font-weight:bold;color:var(--text2);margin-bottom:2px;line-height:1.3;}
.card.open .card-title{color:var(--gold2);}
.safety-tag{display:inline-block;background:var(--red);color:#fff;font-size:9px;
  font-weight:bold;padding:1px 5px;border-radius:3px;margin-bottom:4px;letter-spacing:.5px;}
.quick-ans{font-size:11px;color:#80c8a0;font-style:italic;margin-bottom:3px;line-height:1.4;}
.card-preview{font-size:10px;color:var(--text3);line-height:1.4;}
.card-arrow{color:var(--text3);font-size:12px;flex-shrink:0;margin-top:2px;}
.card.open .card-arrow{color:var(--gold);}

/* EXPANDED */
.card-detail{font-size:12.5px;color:var(--text2);line-height:1.65;
  margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.card-detail h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);margin:10px 0 4px;font-weight:bold;}
.card-detail h4:first-child{margin-top:0;}
.card-detail ul{margin:0;padding-left:16px;}
.card-detail li{margin-bottom:3px;line-height:1.5;}
.src-box{margin-top:10px;padding:6px 10px;background:rgba(0,137,123,.1);
  border-left:3px solid var(--teal);border-radius:0 6px 6px 0;
  font-size:11px;color:var(--teal);font-style:italic;}
.tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;}
.tag{background:var(--bg);border:1px solid var(--border2);border-radius:4px;
  padding:2px 6px;font-size:10px;color:var(--text3);cursor:pointer;transition:all .1s;}
.tag:hover{border-color:var(--gold);color:var(--gold);}
mark{background:var(--gold2);color:#1a1a2e;border-radius:2px;padding:0 2px;}

/* BADGE COLORS */
.b-pub{background:#003a30;border:1px solid #00897B;color:#80d0c8;}
.b-role{background:#002040;border:1px solid #2980b9;color:#80c0f0;}
.b-fs{background:#3a0808;border:1px solid #c0392b;color:#f0a0a0;}
.b-hc{background:#3a1a00;border:1px solid #e67e22;color:#f0c080;}
.b-frm{background:#1a003a;border:1px solid #8e44ad;color:#d0a0f0;}
.b-gm{background:#003060;border:1px solid #2a6aab;color:#a0c8e8;}
.b-prod{background:#3a2000;border:1px solid #F57F17;color:#ffe080;}
.b-str{background:#1a2a00;border:1px solid #7cb342;color:#c0e080;}
.b-san{background:#1a003a;border:1px solid #7b1fa2;color:#d0a0f0;}
.b-eqp{background:#00203a;border:1px solid #0288d1;color:#80c8f0;}
.b-ins{background:#3a1000;border:1px solid #bf360c;color:#f0b080;}
.b-adm{background:#0a003a;border:1px solid #4527a0;color:#c0b0f0;}
.b-wrd{background:#3a1500;border:1px solid #BF360C;color:#f0a080;}
.b-uw{background:#003a35;border:1px solid #00897B;color:#80d0c8;}
.b-cul{background:#3a0060;border:1px solid #9C27B0;color:#d0a0f0;}
.b-trb{background:#003a30;border:1px solid #16a085;color:#80e0d0;}
.b-ldr{background:#002040;border:1px solid #1565c0;color:#80b0e8;}

/* CHECKLISTS */
.cl-wrap{max-width:800px;margin:0 auto;padding:12px 13px 56px;}
.cl-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.cl-hdr{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.cl-title{font-size:13px;font-weight:bold;color:var(--text2);}
.cl-meta{font-size:10px;color:var(--text3);margin-top:2px;}
.cl-body{padding:0 14px 12px;display:none;}
.cl-body.open{display:block;}
.ci-row{display:flex;align-items:flex-start;gap:9px;padding:6px 0;
  border-bottom:1px solid var(--border);cursor:pointer;}
.ci-row:last-child{border-bottom:none;}
.chkbox{width:20px;height:20px;border:2px solid var(--border2);border-radius:4px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.chkbox.done{background:var(--green);border-color:var(--green);}
.chkbox.done::after{content:'✓';color:#fff;font-size:11px;font-weight:bold;}
.ci-txt{flex:1;font-size:12px;color:var(--text2);line-height:1.4;}
.ci-txt.done{text-decoration:line-through;color:var(--text3);}
.crit-tag{font-size:9px;color:#f09070;font-weight:bold;margin-left:4px;}
.cl-actions{margin-top:8px;display:flex;gap:6px;}
.cl-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);
  background:transparent;color:var(--text3);font-size:10px;cursor:pointer;font-family:inherit;}
.cl-btn:hover{border-color:var(--gold);color:var(--gold);}

/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;padding:14px 13px 56px;}
.quiz-title{font-size:20px;font-weight:bold;color:var(--gold);text-align:center;margin-bottom:4px;}
.quiz-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:16px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mode-btn{padding:12px 8px;border-radius:8px;border:1.5px solid var(--border2);
  background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;
  font-size:12px;text-align:center;transition:all .15s;line-height:1.4;}
.mode-btn:hover{border-color:var(--gold);color:var(--gold);}
.mode-icon{font-size:18px;display:block;margin-bottom:3px;}
.missed-info{text-align:center;font-size:11px;color:var(--text3);margin-top:6px;}
.qcard{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:16px;}
.qprog{font-size:11px;color:var(--text3);margin-bottom:6px;}
.qbar{height:4px;background:var(--border);border-radius:2px;margin-bottom:12px;}
.qfill{height:4px;background:var(--gold);border-radius:2px;transition:width .3s;}
.qmeta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.qbadge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:bold;}
.diff-easy{background:#1a3a1a;color:#80c880;border:1px solid #4CAF50;}
.diff-medium{background:#3a2a00;color:#d4b040;border:1px solid #C59A00;}
.diff-hard{background:#3a0a0a;color:#f0a0a0;border:1px solid #c0392b;}
.qlvl{background:#1a2a3a;color:#80b8f0;border:1px solid #2196F3;}
.qcat-badge{background:#1a003a;color:#d0a0f0;border:1px solid #9C27B0;}
.qq{font-size:15px;font-weight:bold;color:var(--text);line-height:1.5;margin-bottom:14px;}
.qopts{display:flex;flex-direction:column;gap:9px;}
.qopt{padding:13px 14px;border-radius:8px;border:1.5px solid var(--border2);
  background:var(--bg);color:var(--text2);cursor:pointer;font-size:13px;
  font-family:inherit;text-align:left;transition:all .15s;line-height:1.4;}
.qopt:hover:not(:disabled){border-color:var(--gold);color:var(--text);}
.qopt.correct{border-color:var(--green);background:#0d2a0d;color:#90e890;}
.qopt.wrong{border-color:var(--red);background:#2a0d0d;color:#f08080;}
.qexpl{margin-top:12px;padding:12px;border-radius:8px;
  background:rgba(0,56,107,.3);border:1px solid var(--navy);
  font-size:12.5px;color:var(--text2);line-height:1.5;}
.qexpl-hd{font-weight:bold;color:var(--gold);margin-bottom:5px;font-size:11px;
  text-transform:uppercase;letter-spacing:1px;}
.qsrc{font-size:10px;color:var(--teal);margin-top:6px;font-style:italic;}
.qnext{width:100%;margin-top:10px;padding:12px;border-radius:8px;border:none;
  background:var(--navy);color:#fff;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;}
.score-wrap{text-align:center;padding:24px 16px;}
.score-num{font-size:52px;font-weight:bold;color:var(--gold);}
.score-lbl{font-size:13px;color:var(--text2);margin-top:4px;}
.score-msg{font-size:15px;color:var(--text);margin-top:14px;font-style:italic;}
.cat-bd{margin-top:14px;background:var(--bg2);border-radius:10px;padding:14px;text-align:left;}
.cat-bd-title{font-size:11px;color:var(--gold);font-weight:bold;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1px;}
.cat-row{display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid var(--border);font-size:12px;}
.cat-row:last-child{border-bottom:none;}
.pct-g{color:var(--green);font-weight:bold;}
.pct-o{color:var(--amber);font-weight:bold;}
.pct-b{color:var(--red);font-weight:bold;}
.score-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.sbtn{flex:1;padding:11px;border-radius:8px;border:1.5px solid var(--border2);
  background:transparent;color:var(--text2);font-size:13px;font-weight:bold;
  cursor:pointer;font-family:inherit;min-width:100px;}
.sbtn.primary{background:var(--gold);border-color:var(--gold);color:#0a1628;}

@media(max-width:600px){
  .hdr{padding:6px 10px;}
  .ctrl{padding:8px 10px 6px;}
  .results{padding:8px 10px 48px;}
  .quiz-wrap,.cl-wrap{padding:10px 10px 48px;}
  .mode-grid{grid-template-columns:1fr 1fr;}
  .qopt{padding:14px 12px;font-size:14px;}
  .qq{font-size:14px;}
}

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="anchor">⚓</div>
    <div>
      <div class="hdr-title">Navy CS Reference</div>
      <div class="hdr-sub">P-486 · E1–E8 · Operational · Advancement</div>
    </div>
  </div>
  <button class="night-btn" id="nightBtn" onclick="toggleNight()">🌙</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('ref',this)">📋 Reference</button>
  <button class="nav-btn" onclick="showTab('cl',this)">✅ Checklists</button>
  <button class="nav-btn" onclick="showTab('quiz',this)">⭐ Quiz</button>
</div>

<!-- REFERENCE -->
<div id="tab-ref">
  <div class="ctrl" id="refCtrl">
    <div class="srch-wrap">
      <span class="srch-icon">🔍</span>
      <input type="text" id="si" placeholder="Search — cooling, 1090, COMRATS, fryer, INSURV..." oninput="doSearch()"/>
    </div>
    <div class="chips" id="chips"></div>
    <div class="rcount" id="rcount"></div>
  </div>
  <div class="results" id="results"></div>
</div>

<!-- CHECKLISTS -->
<div id="tab-cl" style="display:none">
  <div class="cl-wrap" id="clWrap"></div>
</div>

<!-- QUIZ -->
<div id="tab-quiz" style="display:none">
  <div class="quiz-wrap" id="quizWrap"></div>
</div>

<script>
// data-reference.js
// cat codes: pub role fs hc frm gm prod str san eqp ins adm wrd uw cul trb ldr

const CATS = [
  {id:'pub',  label:'Publications',          badge:'b-pub'},
  {id:'role', label:'Roles & Responsibilities', badge:'b-role'},
  {id:'fs',   label:'Food Safety / HACCP',   badge:'b-fs'},
  {id:'hc',   label:'Headcount & Entitlements', badge:'b-hc'},
  {id:'frm',  label:'Forms & Records',       badge:'b-frm'},
  {id:'gm',   label:'General Mess Ops',      badge:'b-gm'},
  {id:'prod', label:'Production & Service',  badge:'b-prod'},
  {id:'str',  label:'Storeroom & Receiving', badge:'b-str'},
  {id:'san',  label:'Cleaning & Sanitation', badge:'b-san'},
  {id:'eqp',  label:'Equipment',             badge:'b-eqp'},
  {id:'ins',  label:'Inspection Prep',       badge:'b-ins'},
  {id:'adm',  label:'Admin & Financials',    badge:'b-adm'},
  {id:'wrd',  label:'Wardroom / CPO Mess',   badge:'b-wrd'},
  {id:'uw',   label:'Underway / Emergency',  badge:'b-uw'},
  {id:'cul',  label:'Culinary Fundamentals', badge:'b-cul'},
  {id:'trb',  label:'Troubleshooting',       badge:'b-trb'},
  {id:'ldr',  label:'Leadership & Training', badge:'b-ldr'},
];
const CAT_MAP = {};
CATS.forEach(c => { CAT_MAP[c.id] = c; });

const REF = [

// ── PUBLICATIONS ─────────────────────────────────────────
{cat:'pub', title:'NAVSUP P-486 — Food Service Management Manual',
 quick:'The governing publication for all Navy General Mess operations. Volumes I and II cover administration, financial accountability, food safety, HACCP, and inspection.',
 rules:['Volume I: GM administration, entitlements, financial records, ordering.',
        'Volume II: Food service operations, HACCP, sanitation, equipment.',
        'Inspectors cite P-486 for every food service deficiency.',
        'All CS must know the sections relevant to their paygrade and billet.'],
 mistakes:['Treating P-486 as optional reading — it is the operational law for CS.',
            'Not knowing which volume covers your area of responsibility.'],
 hits:['Any deviation from P-486 procedures can be cited during INSURV or TYCOM inspection.'],
 src:'NAVSUP P-486',
 tags:['P-486','publication','reference','general mess','food service']},

{cat:'pub', title:'CS TRAMAN / NAVEDTRA — Culinary Training Manual',
 quick:'Primary advancement exam reference covering culinary fundamentals, knife skills, cooking methods, baking, stocks, sauces, kitchen math, and recipe scaling.',
 rules:['Primary study source for E4–E6 advancement exams.',
        'Covers culinary science — the WHY behind cooking techniques.',
        'Knife cuts, cooking temps, mother sauces, stocks, baking all tested on exam.',
        'Know TRAMAN well enough to explain it to junior sailors.'],
 mistakes:['Waiting until advancement season to study TRAMAN.',
            'Memorizing answers without understanding the concepts.'],
 hits:['Advancement exam questions are pulled directly from TRAMAN content.'],
 src:'CS TRAMAN / NAVEDTRA',
 tags:['TRAMAN','NAVEDTRA','advancement','culinary','exam','study']},

{cat:'pub', title:'NAVSUP Pub 7 & 8 — Recipes and Bakery',
 quick:'Pub 7 contains standardized Navy recipes. Pub 8 covers bakery operations. Both are the authorized production reference for GM menus.',
 rules:['Use Pub 7 recipes as the production standard — do not improvise large-batch quantities.',
        'Pub 8 governs bakery item production, scaling, and procedures.',
        'Significant deviation from Pub 7 without FSO approval is a procedural violation.',
        'Recipe cards establish authorized portion sizes.'],
 mistakes:['Improvising recipe quantities for large batches without using Pub 7.',
            'Not scaling bakery recipes correctly for the number of portions needed.'],
 hits:['Production records that do not match Pub 7 portions can be cited during audit.'],
 src:'NAVSUP Pub 7 · NAVSUP Pub 8',
 tags:['Pub 7','Pub 8','recipes','production','bakery','portions']},

{cat:'pub', title:'NAVMED P-5010 — Navy Medical Food Safety',
 quick:'Medical authority on food service sanitation. Chapter 1 provides the public health and scientific basis for Navy food safety rules.',
 rules:['NAVMED P-5010 Chapter 1 covers food service sanitation from a medical standpoint.',
        'Used by medical officers during foodborne illness investigations.',
        'Cross-referenced by inspectors when food safety failures occur.',
        'Explains WHY temperature controls and sanitation rules exist.'],
 mistakes:['Ignoring the medical basis for food safety rules — understanding the why improves compliance.'],
 hits:['Cited alongside P-486 when food safety failures result in illness.'],
 src:'NAVMED P-5010',
 tags:['NAVMED P-5010','medical','food safety','sanitation','illness']},

{cat:'pub', title:'FDA Food Code — National Food Safety Standard',
 quick:'Civilian food safety reference. Navy P-486 rules are built on FDA Food Code principles — HACCP, danger zone, cooling, handwashing, allergen labeling, sick employee policy.',
 rules:['Danger zone (41°F–135°F), cooling procedures, thawing methods — all FDA Food Code derived.',
        'ServSafe certification (recommended CS1+) is based on FDA Food Code.',
        'Big 9 allergen labeling requirements come from FDA.',
        'Knowing FDA Food Code gives the scientific foundation behind P-486 rules.'],
 mistakes:['Not understanding where food safety rules originate.',
            'Skipping ServSafe certification — it is the civilian equivalent of P-486 food safety knowledge.'],
 hits:['FDA Food Code principles back every HACCP CCP.'],
 src:'FDA Food Code',
 tags:['FDA Food Code','HACCP','danger zone','ServSafe','allergens']},

{cat:'pub', title:'OPNAV 5040/1 — Food Service Inspection Checklist',
 quick:'The official Navy food service inspection form. This is EXACTLY what inspectors use. Walk your spaces with this form regularly.',
 rules:['Five graded areas: sanitation/hygiene, food handling/temps, financial records, equipment/maintenance, training documentation.',
        'INSURV, TYCOM, and chain of command all use 5040/1.',
        'Self-inspect using 5040/1 at minimum monthly.',
        'Inspectors do not use a different checklist — this is THE checklist.'],
 mistakes:['Never reading 5040/1 before an inspection.',
            'Preparing for inspection by guessing what inspectors look for.'],
 hits:['Every item on 5040/1 is a potential inspection finding.'],
 src:'OPNAV 5040/1',
 tags:['OPNAV 5040/1','inspection','INSURV','TYCOM','graded','self-inspect']},

// ── ROLES & RESPONSIBILITIES ──────────────────────────────
{cat:'role', title:'Watch Captain — Responsibilities',
 quick:'The watch captain runs the meal period. They are responsible for safety, sanitation, station assignments, logs, line flow, and turnover.',
 rules:['Assign stations before meal prep begins.',
        'Verify cooking, holding, cooling, and sanitizer logs before and during service.',
        'Check serving line setup before opening — hot foods ≥135°F, cold foods ≤41°F.',
        'Monitor line flow and manage replenishment throughout service.',
        'Identify and report food safety or equipment issues immediately.',
        'Complete all logs and brief the oncoming watch before turnover.',
        'Ensure all cooling items are documented with start time and temp before turnover.'],
 mistakes:['Not verifying logs before turnover.',
            'Letting food sit in the danger zone without taking corrective action.',
            'Poor station assignment — wrong sailors on critical stations.',
            'Not briefing the next watch — passing problems silently.',
            'Leaving cooling items unlabeled or unlogged.'],
 hits:['Incomplete HACCP logs','Unlabeled food','Improper holding temps','No turnover documentation'],
 src:'NAVSUP P-486 · Local Command SOP',
 tags:['watch captain','responsibilities','turnover','logs','stations','food safety']},

{cat:'role', title:'Watch Captain — Pre-Service Checklist',
 quick:'Before service opens, the watch captain verifies temps, logs, stations, sanitation, and line setup.',
 rules:['Walk the entire galley — check cleanliness of all surfaces.',
        'Verify walk-in temps logged and within range (fridge ≤41°F, freezer ≤0°F).',
        'Check that all cooking temps are logged for items on the serving line.',
        'Verify sanitizer buckets tested and at correct concentration (chlorine 50–200 ppm).',
        'Confirm all food on line is labeled with item name, date, and time.',
        'Verify hot holding ≥135°F and cold holding ≤41°F at the line.',

{cat:'fs', safety:true, title:'HACCP — 8 Critical Control Points',

        'MOIST HEAT — liquid or steam: Braising (sear first, low heat 2–4 hrs, tough cuts), Stewing (smaller pieces, fully covered), Poaching (160–180°F liquid, eggs/fish), Steaming (above boiling, vegetables/fish), Simmering (180–205°F, stocks/soups).',
        'Tough cuts (chuck, brisket, short ribs): moist heat converts collagen to gelatin — makes cheap cuts tender.',
        'Tender cuts (tenderloin, ribeye): dry heat for quick cook. Moist heat makes them mushy.'],

            'Grilling a tough cut — stays tough.'],

 rules:['COOKING TEMPS: Poultry (all) 165°F | Ground meat 155°F | Pork, fish, steaks 145°F | All other TCS 135°F.',
        'BEEF PRIMALS (front to back): Chuck (tough, braise) → Rib (ribeye, prime rib, roast/grill) → Short Loin (NY strip, T-bone, tenderloin, grill) → Sirloin (grill) → Round (lean/tough, slow roast) → Brisket (slow cook).',
        'Tenderloin = most tender beef cut. Psoas major muscle does almost no work.',
        'PORK: Shoulder 145°F (braise/slow cook). Loin 145°F (roast/grill). Always verify with calibrated thermometer.',
        'POULTRY: 165°F everywhere including stuffing. Dark meat (thighs) more forgiving than breast for volume cooking.'],
 mistakes:['Cooking ground beef to 145°F — must reach 155°F.',
            'Not checking internal temp — color alone is unreliable.'],
 hits:['Cooking temps are heavily tested on advancement exams.'],
 src:'CS TRAMAN / NAVEDTRA · FDA Food Code',
 tags:['cooking temps','165','155','145','beef','pork','poultry','tenderloin','chuck','primal cuts']},

{cat:'cul', title:'Knife Cuts — Sizes and Techniques',
 quick:'Julienne = 1/8" matchstick · Brunoise = 1/8" cube · Small dice = 1/4" · Medium = 1/2" · Large = 3/4" · Chiffonade = thin ribbons. Claw grip always.',
 rules:['Julienne: 1/8 × 1/8 × 2 inch matchstick. Brunoise: 1/8" cube (cross-cut from julienne).',
        'Small dice: 1/4". Medium dice: 1/2". Large dice: 3/4". Tourné: 7-sided football shape.',
        'Chiffonade: stack and roll leafy greens, slice thin — produces ribbons.',
        'Mince: very fine irregular chop (garlic, shallots, herbs).',
        'CLAW GRIP: curl fingertips under — protects them from blade. Always.',
        'Dull knives are more dangerous than sharp — require more force and slip.',
        'Carry knives blade down. Never leave knives in soapy water.'],
 mistakes:['Not using claw grip — leading cause of knife injuries.',
            'Using the wrong knife for the task.',
            'Leaving knives in soapy water.'],
 hits:['Knife cuts and claw grip are heavily tested on advancement exams.'],

{cat:'cul', title:'Stocks, Mother Sauces & Roux',
 quick:'5 Mother Sauces: Béchamel (milk+roux) · Velouté (stock+roux) · Espagnole (brown stock) · Tomato · Hollandaise (butter+yolks). NEVER boil a stock.',
 rules:['MOTHER SAUCES: Béchamel (milk + white roux) | Velouté (white stock + blonde roux) | Espagnole (brown stock + brown roux + mirepoix) | Tomato | Hollandaise (butter + yolks + acid).',
        'ROUX: Equal parts fat and flour. White roux = most thickening. Brown/dark roux = less thickening, more flavor.',
        'STOCKS: Always simmer, NEVER boil — boiling permanently clouds stock by emulsifying fat and albumin.',
        'Skim stock foam during first 30 minutes.',
        'White stock: unroasted bones. Brown stock: roasted bones. Fish fumet: max 30 minutes.',
        'Mirepoix: 2 parts onion, 1 part carrot, 1 part celery.'],
 mistakes:['Boiling a stock — cannot be fixed once cloudy.',
            'Confusing the mother sauces — common exam failure.'],
 hits:['Mother sauces are the most tested culinary topic on advancement exams.'],

 tags:['mother sauces','bechamel','velouté','espagnole','hollandaise','roux','stock','mirepoix']},

{cat:'cul', title:'Kitchen Math — Measurements, Scaling & Food Cost',
 quick:'3 tsp=1 tbsp · 8 oz=1 cup · 2 cups=1 pt · 2 pt=1 qt · 4 qt=1 gal · 16 oz=1 lb. Scale: new÷old=factor. AP÷yield%=order amount.',
 rules:['VOLUME: 3 tsp=1 tbsp | 2 tbsp=1 fl oz | 8 fl oz=1 cup | 2 cups=1 pt | 2 pt=1 qt | 4 qt=1 gal.',
        'WEIGHT: 16 oz = 1 lb.',
        'RECIPE SCALING: Conversion factor = new yield ÷ old yield. Multiply every ingredient by the factor.',
        'AP vs EP: As Purchased weight ÷ yield% = what to order. Example: need 10 lb clean carrots at 80% yield → order 10÷0.80 = 12.5 lb.',
        'Food cost %: food cost ÷ selling price × 100.'],

            'Ordering AP weight without accounting for yield — running short during service.'],
 hits:['Kitchen math is consistently on every CS advancement exam.'],

{cat:'cul', title:'Baking — Leavening, Methods & Common Failures',
 quick:'Yeast = bread. Baking powder = cakes/muffins (no acid needed). Baking soda = needs acid. Proof yeast in 105°F water. Never overmix muffins.',
 rules:['Yeast: biological, ferments sugar → CO2. Proof in 105°F water with sugar — foam in 10 min = active. Killed by water >110°F.',
        'Baking powder: double-acting chemical leavening. No proofing needed. Used in cakes, muffins, pancakes.',
        'Baking soda: requires acid to activate (buttermilk, lemon, vinegar). Reacts immediately — bake right after mixing.',
        'Creaming method (cakes): cream fat + sugar first, then eggs, then dry/wet alternating.',
        'Muffin method: mix wet and dry separately, combine minimally. Lumps are OK — overmixing causes tough muffins with tunnels.',
        'Straight dough method (yeast bread): mix all, knead, proof, shape, second proof, bake.'],
 mistakes:['Not proofing yeast — wastes an entire batch when it fails.',
            'Overmixing muffin batter — produces tough, tunnel-filled muffins.',
            'Water too hot for yeast — kills it before dough is mixed.'],
 hits:['Baking knowledge is heavily tested on CS advancement exams.'],
 src:'CS TRAMAN / NAVEDTRA · NAVSUP Pub 8',
 tags:['baking','yeast','baking powder','baking soda','proofing','muffin method','creaming','scaling']},

{cat:'trb', title:'Cooking Failures — Proteins & Starches',

        'Gluey mashed potatoes: waxy potato used (use russets), or over-mixed. Cannot fix once gluey — prevention only.',
        'Scorched rice: heat too high after boiling, lid removed, or wrong ratio (1:1.75 rice to water). For volume: use steam kettle or combi oven.',

        'Fix for soggy fried: maintain 350–375°F, fry in small batches, pat food dry, drain on wire rack.'],

            'Overfilling the fryer basket.'],

{cat:'trb', title:'Sauce & Stock Failures',

        'Split hollandaise: sauce broke (temp too high or too fast addition). Fix: start new base of egg yolks + water, slowly whisk broken sauce into new base.',

            'Overheating hollandaise — eggs scramble.'],

// SYNONYMS
// ─────────────────────────────────────────
const SYN = {
  fridge:'refrigerator walk-in cold storage 41',
  freezer:'frozen 0 walk-in freeze',
  'food poisoning':'foodborne illness pathogen bacteria outbreak',
  'cash meal':'DD 1544 coupon payment cash',
  'chicken temp':'poultry 165 internal temperature cooking',
  inventory:'storeroom FIFO 1149 receiving count',
  inspection:'INSURV OPNAV 5040 TYCOM audit',
  cleaning:'sanitizing MCS master cleaning schedule field day',
  ordering:'DSCP 367 requisition NSN procurement',
  leftovers:'cooling 135 70 41 blast chiller reheating',
  sick:'illness exclude vomiting diarrhea hygiene',
  fire:'grease fire emergency Class K suppression water',
  thaw:'thawing defrost refrigerator running water room temperature',
  ood:'officer of the deck duty watch',
};

function expandQ(q) {
  let out = q.toLowerCase();
  Object.keys(SYN).forEach(k => { if (out.includes(k)) out += ' ' + SYN[k]; });
  return out;
}
function fuzzyMatch(text, q) {
  const words = expandQ(q).split(/\s+/).filter(w => w.length > 1);
  const t = (text || '').toLowerCase();
  return words.some(w => t.includes(w));
}
function searchCard(item, q) {
  if (!q) return true;
  const haystack = [
    item.title, item.quick, item.src,
    (item.rules || []).join(' '),
    (item.mistakes || []).join(' '),
    (item.hits || []).join(' '),
    (item.tags || []).join(' '),
  ].join(' ');
  return fuzzyMatch(haystack, q);
}

let quizState = { mode:null, questions:[], idx:0, score:0, answered:false, catScores:{}, missed:[] };
let clStates = {};

function lsGet(k) { try { return JSON.parse(localStorage.getItem('csapp_' + k)); } catch(e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem('csapp_' + k, JSON.stringify(v)); } catch(e) {} }

function loadPrefs() {
  nightMode = lsGet('night') || false;
  if (nightMode) { document.body.classList.add('dark'); document.getElementById('nightBtn').textContent = '☀️'; }
  clStates = lsGet('checks') || {};
  quizState.missed = lsGet('missed') || [];
}

// ─────────────────────────────────────────
// TABS
// ─────────────────────────────────────────
function showTab(tab, btn) {
  ['ref', 'cl', 'quiz'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'cl') renderChecklists();
  if (tab === 'quiz') renderQuizMenu();
}

function toggleNight() {
  nightMode = !nightMode;
  document.body.classList.toggle('dark', nightMode);
  document.getElementById('nightBtn').textContent = nightMode ? '☀️' : '🌙';
  lsSet('night', nightMode);
}

// ─────────────────────────────────────────
// REFERENCE
// ─────────────────────────────────────────
function initChips() {
  const wrap = document.getElementById('chips');
  let h = '<span class="chip active" data-cat="all" onclick="setCat(\'all\')">All</span>';
  CATS.forEach(c => {
    h += `<span class="chip" data-cat="${c.id}" onclick="setCat('${c.id}')">${c.label}</span>`;
  });
  wrap.innerHTML = h;
}

function setCat(c) {
  activeCat = c;
  document.querySelectorAll('.chip').forEach(ch => ch.classList.toggle('active', ch.dataset.cat === c));
  openCard = null;
  doSearch();
}

function searchTag(t) {
  document.getElementById('si').value = t;
  openCard = null;
  doSearch();
}

function toggleCard(id) {
  openCard = openCard === id ? null : id;
  doSearch();
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return String(text).replace(re, '<mark>$1</mark>');
}

function doSearch() {
  const q = (document.getElementById('si').value || '').trim();
  const res = REF.filter(item => {
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    return searchCard(item, q);
  });

  const rc = document.getElementById('rcount');
  rc.textContent = res.length + ' result' + (res.length !== 1 ? 's' : '') + ' — tap any card to expand';

  const cont = document.getElementById('results');
  if (!res.length) {
    cont.innerHTML = '<div class="empty">No results' + (q ? ' for "' + q + '"' : '') +
      '<br><span style="font-size:12px;color:var(--text3)">Try: cooling, 1090, COMRATS, fryer, MCS, thawing...</span></div>';
    return;
  }

  cont.innerHTML = res.map((item, i) => {
    const id = item.cat + i;
    const isOpen = openCard === id;
    const ci = CAT_MAP[item.cat] || { label: item.cat, badge: 'b-pub' };

    let detail = '';
    if (isOpen) {
      let body = item.safety ? '<span class="safety-tag">⚠ SAFETY CRITICAL</span><br><br>' : '';

      if (item.rules && item.rules.length) {
        body += '<h4>Key Rules</h4><ul>' + item.rules.map(r => `<li>${hl(r, q)}</li>`).join('') + '</ul>';
      }
      if (item.mistakes && item.mistakes.length) {
        body += '<h4>Common Mistakes</h4><ul>' + item.mistakes.map(m => `<li>${hl(m, q)}</li>`).join('') + '</ul>';
      }
      if (item.hits && item.hits.length) {
        body += '<h4>Inspection Hits</h4><ul>' + item.hits.map(h2 => `<li>${hl(h2, q)}</li>`).join('') + '</ul>';
      }
      if (item.src) {
        body += '<div class="src-box">📚 ' + item.src + '</div>';
      }
      if (item.tags && item.tags.length) {
        body += '<div class="tags">' + item.tags.map(t2 =>
          `<span class="tag" onclick="searchTag('${t2.replace(/'/g, "\\'")}');event.stopPropagation()">${t2}</span>`
        ).join('') + '</div>';
      }
      detail = '<div class="card-detail">' + body + '</div>';
    }

    return `<div class="card${isOpen ? ' open' : ''}${item.safety ? ' safety' : ''}" onclick="toggleCard('${id}')">
      <div class="card-inner">
        <span class="cat-badge ${ci.badge}">${ci.label}</span>
        <div class="card-body">
          <div class="card-title">${hl(item.title, q)}</div>
          ${item.quick ? `<div class="quick-ans">⚡ ${hl(item.quick, q)}</div>` : ''}
          ${!isOpen ? `<div class="card-preview">${hl((item.rules && item.rules[0]) || '', q)}</div>` : ''}
          ${detail}
        </div>
        <span class="card-arrow">${isOpen ? '▲' : '▼'}</span>
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// CHECKLISTS
// ─────────────────────────────────────────
function renderChecklists() {
  const wrap = document.getElementById('clWrap');
  wrap.innerHTML = CL.map((cl, ci) => {
    const st = clStates[ci] || {};
    const done = Object.values(st).filter(Boolean).length;
    const total = cl.items.length;
    const items = cl.items.map((item, ii) => {
      const checked = st[ii] || false;
      return `<div class="ci-row" onclick="toggleCheck(${ci},${ii})">
        <div class="chkbox${checked ? ' done' : ''}"></div>
        <div class="ci-txt${checked ? ' done' : ''}">${item.t}${item.c ? '<span class="crit-tag">★ CRITICAL</span>' : ''}</div>
      </div>`;
    }).join('');
    return `<div class="cl-card">
      <div class="cl-hdr" onclick="toggleCL(${ci})">
        <div>
          <div class="cl-title">${cl.emoji} ${cl.title}</div>
          <div class="cl-meta">${done}/${total} complete ${done === total ? '✅' : done > 0 ? '🔄' : ''}</div>
        </div>
        <span style="color:var(--text3);font-size:12px">▼</span>
      </div>
      <div class="cl-body${ci === 0 ? ' open' : ''}" id="cl-${ci}">
        ${items}
        <div class="cl-actions">
          <button class="cl-btn" onclick="resetCL(${ci});event.stopPropagation()">↺ Reset</button>
          <button class="cl-btn" onclick="printCL(${ci});event.stopPropagation()">🖨 Print</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCL(ci) { document.getElementById('cl-' + ci).classList.toggle('open'); }

function toggleCheck(ci, ii) {
  if (!clStates[ci]) clStates[ci] = {};
  clStates[ci][ii] = !clStates[ci][ii];
  lsSet('checks', clStates);
  renderChecklists();
  document.getElementById('cl-' + ci).classList.add('open');
}

function resetCL(ci) {
  clStates[ci] = {};
  lsSet('checks', clStates);
  renderChecklists();
  document.getElementById('cl-' + ci).classList.add('open');
}

function printCL(ci) {
  const cl = CL[ci];
  const w = window.open('', '_blank');
  w.document.write(`<html><body style="font-family:sans-serif;padding:20px;max-width:600px">
    <h2>${cl.emoji} ${cl.title}</h2>
    <p style="color:#666;margin-bottom:16px;font-size:12px">Navy CS Reference</p>
    ${cl.items.map(item => `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #eee;align-items:flex-start">
      <div style="width:20px;height:20px;border:2px solid #333;border-radius:3px;flex-shrink:0;margin-top:1px"></div>
      <div style="font-size:13px">${item.t}${item.c ? ' <strong>★</strong>' : ''}</div>
    </div>`).join('')}
  </body></html>`);
  w.print();
}

// ─────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────
const QUIZ_MODES = [
  { id: 'q10',    icon: '⚡', label: 'Quick 10',     desc: '10 random questions' },
  { id: 'full',   icon: '📋', label: 'Full Mixed',   desc: 'All questions shuffled' },
  { id: 'E4',     icon: '🎯', label: 'E4 Prep',      desc: 'E4 level only' },
  { id: 'E5',     icon: '🎯', label: 'E5 Prep',      desc: 'E4 + E5 questions' },
  { id: 'E6',     icon: '🎯', label: 'E6 Prep',      desc: 'E4–E6 questions' },
  { id: 'fs',     icon: '🌡️', label: 'Food Safety',  desc: 'HACCP & safety' },
  { id: 'forms',  icon: '📄', label: 'Forms',        desc: 'Records & accountability' },
  { id: 'insp',   icon: '🔎', label: 'Inspection',   desc: 'Inspection questions' },
  { id: 'missed', icon: '❌', label: 'Missed Q\'s',  desc: 'Review wrong answers' },
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function getPool(mode) {
  const missed = lsGet('missed') || [];
  if (mode === 'q10')   return shuffle(QUIZ).slice(0, 10);
  if (mode === 'full')  return shuffle(QUIZ);
  if (mode === 'E4')    return shuffle(QUIZ.filter(q => q.lvl === 'E4'));
  if (mode === 'E5')    return shuffle(QUIZ.filter(q => ['E4','E5'].includes(q.lvl)));
  if (mode === 'E6')    return shuffle(QUIZ.filter(q => ['E4','E5','E6'].includes(q.lvl)));
  if (mode === 'fs')    return shuffle(QUIZ.filter(q => q.cat === 'Food Safety'));
  if (mode === 'forms') return shuffle(QUIZ.filter(q => q.cat === 'Forms'));
  if (mode === 'insp')  return shuffle(QUIZ.filter(q => q.cat === 'Inspection'));
  if (mode === 'missed') {
    const pool = QUIZ.filter(q => missed.includes(q.q));
    return pool.length ? shuffle(pool) : shuffle(QUIZ).slice(0, 10);
  }
  return shuffle(QUIZ);
}

function renderQuizMenu() {
  const missed = lsGet('missed') || [];
  const last = lsGet('lastScore');
  const qw = document.getElementById('quizWrap');
  qw.innerHTML = `
    <div class="quiz-title">⭐ Quiz</div>
    <div class="quiz-sub">${QUIZ.length} questions · Scenario + knowledge + inspection
      ${last ? '<br>Last score: ' + last.score + '/' + last.total : ''}</div>
    <div class="mode-grid">
      ${QUIZ_MODES.map(m => `<button class="mode-btn" onclick="startQuiz('${m.id}')">
        <span class="mode-icon">${m.icon}</span>
        <strong>${m.label}</strong><br>
        <span style="font-size:10px;color:var(--text3)">${m.desc}</span>
      </button>`).join('')}
    </div>
    <div class="missed-info">${missed.length} missed question${missed.length !== 1 ? 's' : ''} saved
      ${missed.length ? '<button class="cl-btn" style="margin-left:8px" onclick="clearMissed()">Clear</button>' : ''}
    </div>`;
}

function startQuiz(mode) {
  const questions = getPool(mode);
  if (!questions.length) { alert('No questions for this mode.'); return; }
  quizState = { mode, questions, idx: 0, score: 0, answered: false, catScores: {}, missed: lsGet('missed') || [] };
  renderQuestion();
}

function renderQuestion() {
  const { questions, idx, score, answered } = quizState;
  if (idx >= questions.length) { renderScore(); return; }
  const q = questions[idx];
  const pct = Math.round((idx / questions.length) * 100);
  const diffCls = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[q.diff] || 'diff-easy';
  const qw = document.getElementById('quizWrap');
  qw.innerHTML = `<div class="qcard">
    <div class="qprog">Q${idx + 1} of ${questions.length} &nbsp;·&nbsp; Score: ${score}/${idx}</div>
    <div class="qbar"><div class="qfill" style="width:${pct}%"></div></div>
    <div class="qmeta">
      <span class="qbadge ${diffCls}">${q.diff.toUpperCase()}</span>
      <span class="qbadge qlvl">${q.lvl}</span>
      <span class="qbadge qcat-badge">${q.cat}</span>
    </div>
    <div class="qq">${q.q}</div>
    <div class="qopts">${q.opts.map((opt, i) =>
      `<button class="qopt" id="qo${i}" onclick="answerQ(${i})" ${answered ? 'disabled' : ''}>${opt}</button>`
    ).join('')}</div>
    ${answered ? `<div class="qexpl">
      <div class="qexpl-hd">${quizState.lastCorrect ? '✅ Correct!' : '❌ Incorrect'}</div>
      ${q.explain}
      <div class="qsrc">📚 ${q.src}</div>
    </div>
    <button class="qnext" onclick="nextQ()">${idx + 1 < questions.length ? 'Next Question →' : 'See Results'}</button>` : ''}
  </div>`;

  if (answered) {
    q.opts.forEach((_, i) => {
      const btn = document.getElementById('qo' + i);
      if (!btn) return;
      if (i === q.c) btn.classList.add('correct');
      else if (i === quizState.lastAnswer && i !== q.c) btn.classList.add('wrong');
    });
  }
}

function answerQ(selected) {
  if (quizState.answered) return;
  const q = quizState.questions[quizState.idx];
  const correct = selected === q.c;
  quizState.answered = true;
  quizState.lastCorrect = correct;
  quizState.lastAnswer = selected;
  if (correct) {
    quizState.score++;
  } else {
    if (!quizState.missed.includes(q.q)) quizState.missed.push(q.q);
    lsSet('missed', quizState.missed);
  }
  if (!quizState.catScores[q.cat]) quizState.catScores[q.cat] = { r: 0, t: 0 };
  quizState.catScores[q.cat].t++;
  if (correct) quizState.catScores[q.cat].r++;
  renderQuestion();
}

function nextQ() {
  quizState.idx++;
  quizState.answered = false;
  renderQuestion();
}

function renderScore() {
  const { score, questions, catScores, missed, mode } = quizState;
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  lsSet('lastScore', { score, total });
  const msg = pct >= 90 ? 'Outstanding — advancement ready. 🌟' :
    pct >= 75 ? 'Good work. Review weak areas and drill again.' :
    pct >= 60 ? 'Decent start. Study the reference cards then quiz again.' :
    'Keep at it. Daily reference + quiz = advancement.';
  const cats = Object.entries(catScores).map(([c, { r, t }]) => {
    const p = Math.round((r / t) * 100);
    const cls = p >= 80 ? 'pct-g' : p >= 60 ? 'pct-o' : 'pct-b';
    return `<div class="cat-row"><span>${c}</span><span class="${cls}">${r}/${t} (${p}%)</span></div>`;
  }).join('');
  const sorted = Object.entries(catScores).sort(([, a], [, b]) => (a.r / a.t) - (b.r / b.t));
  const weak = sorted[0];
  const strong = sorted[sorted.length - 1];
  document.getElementById('quizWrap').innerHTML = `<div class="score-wrap">
    <div style="font-size:40px">⚓</div>
    <div class="score-num">${pct}%</div>
    <div class="score-lbl">${score} correct out of ${total}</div>
    <div class="score-msg">${msg}</div>
    ${strong ? `<div style="font-size:12px;color:var(--green);margin-top:8px">✅ Strongest: ${strong[0]}</div>` : ''}
    ${weak ? `<div style="font-size:12px;color:var(--red);margin-top:4px">⚠️ Weakest: ${weak[0]} — review those cards</div>` : ''}
    <div class="cat-bd">
      <div class="cat-bd-title">Category Breakdown</div>
      ${cats}
    </div>
    <div class="score-btns">
      <button class="sbtn primary" onclick="renderQuizMenu()">Back</button>
      <button class="sbtn" onclick="startQuiz('${mode}')">Retry</button>
      ${missed.length ? `<button class="sbtn" onclick="startQuiz('missed')">Missed (${missed.length})</button>` : ''}
    </div>
  </div>`;
}

function clearMissed() {
  quizState.missed = [];
  lsSet('missed', []);
  renderQuizMenu();
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
function init() {
  loadPrefs();
  initChips();
  doSearch();
}
document.readyState === 'loading'
  ? document.addEventListener('DOMContentLoaded', init)
  : init();

</script>
</body>
</html>
